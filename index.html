<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кто Валера?</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 50px;
        }
        .option {
            font-size: 24px;
            margin: 10px 0;
            padding: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .option:hover {
            color: red;
        }
        .hidden-text {
            display: none;
        }
    </style>
</head>
<body>
    <h1>Кто Валера?</h1>
    <div class="option" onmouseover="changeText(this)" onmouseout="resetText(this)">Крутой</div>
    <div class="option" onmouseover="changeText(this)" onmouseout="resetText(this)">Классный</div>
    <div class="option" onmouseover="changeText(this)" onmouseout="resetText(this)">Пиздатый</div>
    <div class="option" onmouseover="changeText(this)" onmouseout="resetText(this)">Ахуенный</div>

    <script>
        function changeText(element) {
            element.innerHTML = "Хуесос";
        }

        function resetText(element) {
            // возвращаем оригинальное значение
            const options = {
                'Крутой': 'Крутой',
                'Классный': 'Классный',
                'Пиздатый': 'Пиздатый',
                'Ахуенный': 'Ахуенный',
            };
            element.innerHTML = options[element.innerHTML];
        }
    </script>
</body>
</html>
